<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Central – Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a12;--surface:#0d1524;--card:#111d30;--border:#1e3a5f;--accent:#00e5ff;--accent2:#ff4d6d;--accent3:#a855f7;--text:#e2eaf5;--muted:#7a92b0;--glow:0 0 20px rgba(0,229,255,0.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(0,229,255,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(6,10,18,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-icon{width:48px;height:48px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(0,229,255,0.5))}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-text .gaming{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-text .central{font-family:'Orbitron',monospace;font-weight:400;font-size:10px;letter-spacing:6px;color:var(--muted);margin-top:2px}
nav{display:flex;gap:6px}
nav button{background:transparent;border:1px solid transparent;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
nav button:hover,nav button.active{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,0.06)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;transition:border-color .2s}
.search-bar:focus-within{border-color:var(--accent);box-shadow:var(--glow)}
.search-bar input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;width:180px}
.search-bar input::placeholder{color:var(--muted)}
.hero{position:relative;z-index:2;text-align:center;padding:56px 20px 36px}
.hero h1{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(26px,5vw,50px);letter-spacing:2px;line-height:1.1;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,#00e5ff 0%,#a855f7 50%,#ff4d6d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:14px;font-weight:300;letter-spacing:1px}
.categories{position:relative;z-index:2;display:flex;justify-content:center;flex-wrap:wrap;gap:8px;padding:0 40px 32px}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border-radius:50px;cursor:pointer;transition:all .2s}
.cat-btn:hover,.cat-btn.active{background:rgba(0,229,255,0.1);border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
.section{position:relative;z-index:2;padding:0 40px 48px;max-width:1400px;margin:0 auto}
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.section-header h2{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;letter-spacing:3px}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.section-badge{font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:4px;border:1px solid}
.badge-hot{color:var(--accent2);border-color:var(--accent2);background:rgba(255,77,109,0.08)}
.badge-all{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,0.08)}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.game-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 30px rgba(0,229,255,0.15),var(--glow)}
.game-thumb{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.game-thumb svg{width:60%;height:60%;position:relative;z-index:1}
.game-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(6,10,18,0.75) 100%)}
.g1{background:linear-gradient(135deg,#0d1b3e,#1a3a6b)}
.g2{background:linear-gradient(135deg,#1a0a2e,#4a1060)}
.g3{background:linear-gradient(135deg,#0a2a1a,#0d5c34)}
.g4{background:linear-gradient(135deg,#2a0a0a,#6b1a1a)}
.g5{background:linear-gradient(135deg,#0a1a2a,#1a5060)}
.g6{background:linear-gradient(135deg,#1a1a0a,#5c4a0d)}
.g7{background:linear-gradient(135deg,#2a0a1a,#7a1050)}
.g8{background:linear-gradient(135deg,#0a0a2a,#2020aa)}
.g9{background:linear-gradient(135deg,#0a2a2a,#0d6b6b)}
.g10{background:linear-gradient(135deg,#1a2a0a,#4a6b10)}
.g11{background:linear-gradient(135deg,#2a1a0a,#7a4a10)}
.g12{background:linear-gradient(135deg,#0a0a1a,#201060)}
.g13{background:linear-gradient(135deg,#1a0a0a,#8b0000)}
.g14{background:linear-gradient(135deg,#000a1a,#003366)}
.g15{background:linear-gradient(135deg,#0a1a0a,#006600)}
.g16{background:linear-gradient(135deg,#1a1a1a,#444444)}
.tag-ribbon{position:absolute;top:9px;right:9px;z-index:4;font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:4px}
.ribbon-hot{background:var(--accent2);color:#fff}
.ribbon-new{background:#22c55e;color:#fff}
.game-info{padding:11px 13px 13px}
.game-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{display:flex;align-items:center;justify-content:space-between}
.game-cat{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.game-stars{font-size:10px;color:#f59e0b}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3;opacity:0;transition:all .25s}
.game-card:hover .play-overlay{opacity:1;background:rgba(0,229,255,0.05)}
.play-btn{width:46px;height:46px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;transform:scale(0.7);transition:transform .2s;box-shadow:0 0 24px rgba(0,229,255,0.7)}
.game-card:hover .play-btn{transform:scale(1)}
.play-btn svg{color:#000;margin-left:3px}
#game-player{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
#game-player.open{display:flex}
.player-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#060a12;border-bottom:1px solid #1e3a5f;flex-shrink:0}
.player-title-wrap{display:flex;align-items:center;gap:10px}
#player-title{font-family:'Orbitron',monospace;font-size:13px;color:#00e5ff;letter-spacing:2px}
.player-sub{font-size:11px;color:#7a92b0;letter-spacing:1px}
.pbtn{font-family:'Exo 2',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;padding:7px 18px;border-radius:6px;cursor:pointer;border:1px solid;background:transparent;transition:all .2s}
.pbtn-exit{border-color:#ff4d6d;color:#ff4d6d}
.pbtn-exit:hover{background:rgba(255,77,109,0.12)}
#game-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#060a12}
footer{position:relative;z-index:2;text-align:center;padding:28px 40px;border-top:1px solid var(--border);color:var(--muted);font-size:11px;letter-spacing:1px}
footer span{color:var(--accent)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.section{animation:fadeUp .5s ease both}
@media(max-width:700px){header{padding:12px 16px;flex-wrap:wrap;gap:10px}.section{padding:0 14px 32px}nav{display:none}.game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="closePlayer()">
    <!-- Logo: hexagon shield with GC monogram -->
    <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
        <linearGradient id="lg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ff4d6d"/></linearGradient>
      </defs>
      <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" stroke="url(#lg1)" stroke-width="2" fill="rgba(0,229,255,0.07)"/>
      <path d="M20 17 L14 17 L14 31 L20 31 L20 27 L17 27 L17 24 L20 24 L20 21 L17 21 L17 20 L20 20 Z" fill="url(#lg1)"/>

    </svg>
    <div class="logo-text"><span class="gaming">GAMING</span><span class="central">C E N T R A L</span></div>
  </div>
  <nav>
    <button class="active" onclick="filterCat('all',this)">HOME</button>
    <button onclick="filterCat('arcade',this)">ARCADE</button>
    <button onclick="filterCat('action',this)">ACTION</button>
    <button onclick="filterCat('puzzle',this)">PUZZLE</button>
    <button onclick="filterCat('racing',this)">RACING</button>
    <button onclick="filterCat('horror',this)">HORROR</button>
    <button onclick="filterCat('strategy',this)">STRATEGY</button>
  </nav>
  <div class="search-bar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search games..." oninput="filterGames(this.value)">
  </div>
</header>

<div class="hero">
  <h1><span>Unblocked Games</span><br>Play Anywhere, Anytime</h1>
  <p>Free browser games — No downloads — No restrictions — Works everywhere</p>
</div>

<div class="categories">
  <button class="cat-btn active" onclick="filterCat('all',this)">ALL GAMES</button>
  <button class="cat-btn" onclick="filterCat('arcade',this)">ARCADE</button>
  <button class="cat-btn" onclick="filterCat('action',this)">ACTION</button>
  <button class="cat-btn" onclick="filterCat('puzzle',this)">PUZZLE</button>
  <button class="cat-btn" onclick="filterCat('racing',this)">RACING</button>
  <button class="cat-btn" onclick="filterCat('horror',this)">HORROR</button>
  <button class="cat-btn" onclick="filterCat('strategy',this)">STRATEGY</button>
</div>

<div class="section" id="featured-section">
  <div class="section-header"><h2>FEATURED</h2><div class="section-line"></div><span class="section-badge badge-hot">HOT</span></div>
  <div class="game-grid" id="featured-grid"></div>
</div>
<div class="section">
  <div class="section-header"><h2>ALL GAMES</h2><div class="section-line"></div><span class="section-badge badge-all" id="game-count">20 GAMES</span></div>
  <div class="game-grid" id="all-grid"></div>
</div>

<div id="game-player">
  <div class="player-bar">
    <div class="player-title-wrap">
      <span id="player-title">GAME</span>
      <span class="player-sub">— Gaming Central</span>
    </div>
    <button class="pbtn pbtn-exit" onclick="closePlayer()">X EXIT</button>
  </div>
  <div id="game-canvas-wrap"></div>
</div>

<footer><p>2026 <span>Gaming Central</span> — All games run locally. No downloads, no blocks, no restrictions.</p></footer>

function makeCard(g) {
  return `<div class="game-card" onclick="launchGame('${g.id}')" data-cat="${g.cat}" data-title="${g.title.toLowerCase()}">
    ${g.hot ? '<span class="tag-ribbon ribbon-hot">HOT</span>' : ''}
    <div class="play-overlay"><div class="play-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div></div>
    <div class="game-thumb ${g.bg}">${ICONS[g.icon] || ''}</div>
    <div class="game-info">
      <div class="game-title">${g.title}</div>
      <div class="game-meta"><span class="game-cat">${g.cat}</span><span class="game-stars">${g.stars}</span></div>
    </div>
  </div>`;
}

document.getElementById('featured-grid').innerHTML = GAMES.filter(g => g.hot).map(makeCard).join('');
document.getElementById('all-grid').innerHTML = GAMES.map(makeCard).join('');
document.getElementById('game-count').textContent = GAMES.length + ' GAMES';

function launchGame(id) {
  const g = GAMES.find(x => x.id === id);
  document.getElementById('player-title').textContent = g.title.toUpperCase();
  document.getElementById('game-canvas-wrap').innerHTML = '';
  document.getElementById('game-player').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (ENGINES[id]) ENGINES[id]();
  else showComingSoon(g.title);
}

function closePlayer() {
  document.getElementById('game-player').classList.remove('open');
  document.getElementById('game-canvas-wrap').innerHTML = '';
  document.body.style.overflow = '';
  document.onkeydown = null;
  document.onkeyup = null;
}

function showComingSoon(title) {
  document.getElementById('game-canvas-wrap').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;"><div style="font-family:'Orbitron',monospace;font-size:22px;color:#00e5ff;">${title}</div><div style="color:#7a92b0;">Loading game engine...</div></div>`;
}

const ENGINES = {};

/* ── SNAKE ── */
ENGINES.snake=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<canvas id="gc" style="display:block;margin:auto;"></canvas><div style="text-align:center;padding:8px;font-family:'Orbitron',monospace;color:#00e5ff;font-size:12px;">Score:<span id="sc"> 0</span>  Hi:<span id="hs"> 0</span> — Arrow keys/WASD to move</div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d');
  const SZ=22,COLS=26,ROWS=20;C.width=COLS*SZ;C.height=ROWS*SZ;
  let snake=[{x:13,y:10}],dir={x:1,y:0},nd={x:1,y:0},food={},score=0,hi=0,alive=true;
  function rf(){food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}rf();
  document.onkeydown=e=>{
    const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    if(!m[e.key])return;e.preventDefault();const n=m[e.key];if(n.x!==-dir.x||n.y!==-dir.y)nd=n;
    if(!alive){snake=[{x:13,y:10}];dir={x:1,y:0};nd={x:1,y:0};score=0;alive=true;document.getElementById('sc').textContent=' 0';rf();}
  };
  function draw(){
    ctx.fillStyle='#060a12';ctx.fillRect(0,0,C.width,C.height);
    ctx.strokeStyle='rgba(0,229,255,0.03)';for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,C.height);ctx.stroke();}for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(C.width,j*SZ);ctx.stroke();}
    ctx.fillStyle='#ff4d6d';ctx.shadowColor='#ff4d6d';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    snake.forEach((s,i)=>{const t=1-i/snake.length;ctx.fillStyle=`rgba(0,${Math.round(t*229)},${Math.round(t*255)},${0.4+t*0.6})`;ctx.shadowColor='#00e5ff';ctx.shadowBlur=i===0?14:3;ctx.beginPath();ctx.roundRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,4);ctx.fill();});ctx.shadowBlur=0;
    if(!alive){ctx.fillStyle='rgba(6,10,18,0.8)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#ff4d6d';ctx.font='bold 26px Orbitron';ctx.textAlign='center';ctx.fillText('GAME OVER',C.width/2,C.height/2-12);ctx.fillStyle='#7a92b0';ctx.font='14px Exo 2';ctx.fillText('Press any arrow to restart',C.width/2,C.height/2+16);}
  }
  setInterval(()=>{if(!alive)return;dir=nd;const h={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};if(snake.some(s=>s.x===h.x&&s.y===h.y)){alive=false;draw();return;}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;if(score>hi)hi=score;document.getElementById('sc').textContent=' '+score;document.getElementById('hs').textContent=' '+hi;rf();}else snake.pop();draw();},130);draw();
};

/* ── TETRIS ── */
ENGINES.tetris=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<div style="display:flex;justify-content:center;align-items:flex-start;gap:18px;padding:10px;height:100%;overflow:auto;"><canvas id="gc" style="background:#060a12;border:1px solid #1e3a5f;border-radius:8px;"></canvas><div style="padding-top:6px;min-width:108px;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;letter-spacing:2px;">SCORE</div><div id="sc" style="font-family:'Orbitron',monospace;font-size:20px;color:#00e5ff;margin-bottom:10px;">0</div><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;letter-spacing:2px;">LINES</div><div id="ln" style="font-family:'Orbitron',monospace;font-size:20px;color:#a855f7;margin-bottom:10px;">0</div><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;margin-bottom:6px;">NEXT</div><canvas id="nc" width="80" height="80" style="background:#0d1524;border-radius:6px;border:1px solid #1e3a5f;"></canvas><div style="font-size:10px;color:#3a5a7a;line-height:2;margin-top:10px;">Arrows move<br>Up rotates<br>Space drops</div></div></div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d'),NC=document.getElementById('nc'),nctx=NC.getContext('2d');
  const SZ=26,COLS=10,ROWS=20;C.width=COLS*SZ;C.height=ROWS*SZ;
  const COL=['','#ff4d6d','#00e5ff','#f59e0b','#a855f7','#4ade80','#f97316','#38bdf8'];
  const P=[[[1,1,1,1]],[[2,2],[2,2]],[[0,3,0],[3,3,3]],[[4,0],[4,0],[4,4]],[[0,5],[0,5],[5,5]],[[6,6,0],[0,6,6]],[[0,7,7],[7,7,0]]];
  let board=Array.from({length:ROWS},()=>Array(COLS).fill(0)),piece,px,py,score=0,lines=0,alive=true,nxt;
  function rp(){return P[Math.floor(Math.random()*P.length)];}
  function sp(){piece=nxt||rp();nxt=rp();px=Math.floor(COLS/2)-Math.floor(piece[0].length/2);py=0;if(!vl(piece,px,py))alive=false;}
  function vl(p,x,y){return p.every((row,r)=>row.every((v,c)=>!v||(y+r>=0&&y+r<ROWS&&x+c>=0&&x+c<COLS&&!board[y+r][x+c])));}
  function mg(){piece.forEach((row,r)=>row.forEach((v,c)=>{if(v)board[py+r][px+c]=v;}));}
  function cl(){let n=0;for(let r=ROWS-1;r>=0;){if(board[r].every(v=>v)){board.splice(r,1);board.unshift(Array(COLS).fill(0));n++;}else r--;}if(n){lines+=n;score+=n===4?800:n===3?500:n===2?300:100;document.getElementById('sc').textContent=score;document.getElementById('ln').textContent=lines;}}
  function db(){
    ctx.fillStyle='#060a12';ctx.fillRect(0,0,C.width,C.height);
    ctx.strokeStyle='rgba(0,229,255,0.04)';for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,C.height);ctx.stroke();}for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(C.width,j*SZ);ctx.stroke();}

    });
    // Bullets
    bullets.forEach(b=>{ctx.fillStyle='#f59e0b';ctx.shadowColor='#f59e0b';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    // HUD
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,C.width,34);
    ctx.fillStyle='#f59e0b';ctx.font='12px Orbitron';ctx.textAlign='left';ctx.fillText('Gold: '+gold,8,22);
    ctx.fillStyle='#ff4d6d';ctx.textAlign='center';ctx.fillText('Lives: '+lives,C.width/2-60,22);
    ctx.fillStyle='#00e5ff';ctx.fillText('Wave: '+wave+'/10',C.width/2+60,22);
    ctx.fillStyle='#7a92b0';ctx.textAlign='right';ctx.fillText('Score: '+score,C.width-8,22);
    if(!waveActive&&state==='play'){ctx.fillStyle='#4ade80';ctx.font='11px Orbitron';ctx.textAlign='center';ctx.fillText(wave<10?'Next wave in '+(Math.floor((300-waveTimer)/60)+1)+'s':'Waves complete!',C.width/2,C.height-8);}
    if(state==='gameover'){ctx.fillStyle='rgba(6,10,18,0.88)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#ff4d6d';ctx.font='bold 22px Orbitron';ctx.textAlign='center';ctx.fillText('BASE DESTROYED',C.width/2,C.height/2-16);ctx.fillStyle='#7a92b0';ctx.font='13px Exo 2';ctx.fillText('Score: '+score+'  Wave: '+wave+' — Enter to retry',C.width/2,C.height/2+14);}
    if(state==='win'){ctx.fillStyle='rgba(6,10,18,0.88)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#4ade80';ctx.font='bold 22px Orbitron';ctx.textAlign='center';ctx.fillText('ALL WAVES SURVIVED!',C.width/2,C.height/2-16);ctx.fillStyle='#7a92b0';ctx.font='13px Exo 2';ctx.fillText('Score: '+score,C.width/2,C.height/2+14);}
  }
  function loop(){
    frame++;
    if(state==='play'){
      if(!waveActive){waveTimer++;if(waveTimer>=300){waveTimer=0;if(wave<10)spawnWave();else if(!enemies.length)state='win';}}
      if(waveActive){spawnTimer++;if(spawnTimer>=40&&spawnCount>0){spawnTimer=0;spawnCount--;const hp=30+wave*20;enemies.push({pathIdx:0,x:PATH[0].c*TS+TS/2,y:PATH[0].r*TS+TS/2,hp,maxHp:hp,speed:0.6+wave*0.08});if(spawnCount===0)waveActive=false;}}
      enemies.forEach(e=>{e.pathIdx+=e.speed/TS;if(e.pathIdx>=PATH.length){lives--;e.hp=0;}else{const p=PATH[Math.min(Math.floor(e.pathIdx),PATH.length-1)];e.x+=(p.c*TS+TS/2-e.x)*0.2;e.y+=(p.r*TS+TS/2-e.y)*0.2;}});
      enemies=enemies.filter(e=>e.hp>0);if(lives<=0)state='gameover';
      towers.forEach(t=>{t.timer--;if(t.timer>0)return;const target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<t.range);if(target){t.timer=30;bullets.push({x:t.x,y:t.y,tx:target,dmg:t.dmg,spd:5});}});
      bullets.forEach(b=>{const dx=b.tx.x-b.x,dy=b.tx.y-b.y,d=Math.hypot(dx,dy);if(d<8){b.tx.hp-=b.dmg;if(b.tx.hp<=0){score+=10+wave;gold+=15;}b.done=true;}else{b.x+=dx/d*b.spd;b.y+=dy/d*b.spd;}});
      bullets=bullets.filter(b=>!b.done&&b.tx.hp>0);
    }
    draw();requestAnimationFrame(loop);
  }loop();
};

/* ── PLATFORMER ── */
ENGINES.platformer=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<canvas id="gc" style="display:block;margin:auto;background:#060a12;"></canvas><div style="text-align:center;padding:6px;font-family:'Orbitron',monospace;color:#00e5ff;font-size:11px;">WASD/Arrows move — Space jump — Collect stars!</div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d');C.width=600;C.height=440;
  const PLATS=[{x:0,y:400,w:600,h:20},{x:100,y:320,w:120,h:14},{x:300,y:260,w:100,h:14},{x:480,y:300,w:100,h:14},{x:160,y:200,w:80,h:14},{x:380,y:180,w:120,h:14},{x:50,y:140,w:100,h:14},{x:260,y:100,w:80,h:14},{x:460,y:120,w:120,h:14}];

  let ENEMIES=[{x:110,y:305,vx:1.5,left:100,right:220},{x:310,y:245,vx:-1.5,left:300,right:400},{x:50,y:385,vx:2,left:0,right:580}];
  let player={x:50,y:370,vx:0,vy:0,w:22,h:30,onGround:false,hp:3,invTimer:0,score:0,won:false},keys={},state='play',frame=0;

      player.x=Math.max(0,Math.min(C.width-player.w,player.x));if(player.y>C.height+20){player.hp--;player.x=50;player.y=370;player.vy=0;}
      if(player.invTimer>0)player.invTimer--;
      ENEMIES.forEach(e=>{e.x+=e.vx;if(e.x<e.left||e.x>e.right)e.vx*=-1;if(player.invTimer<=0&&player.x+player.w-4>e.x&&player.x+4<e.x+20&&player.y+player.h>e.y&&player.y<e.y+20){player.hp--;player.invTimer=60;if(player.hp<=0)state='dead';}});
      STARS=STARS.map(s=>{if(!s.col&&player.x+player.w>s.x-8&&player.x<s.x+8&&player.y+player.h>s.y-8&&player.y<s.y+8){player.score++;return{...s,col:true};}return s;});
      if(STARS.every(s=>s.col))state='win';
    }
    ctx.fillStyle='#060a12';ctx.fillRect(0,0,C.width,C.height);
    // BG
    [[50,300,30,100],[180,280,25,120],[340,290,35,110],[520,270,28,130]].forEach(([x,y,w2,h])=>{ctx.fillStyle='#0a1628';ctx.fillRect(x,y,w2,h);});
    PLATS.forEach(p=>{ctx.fillStyle='#1e3a5f';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#2a5080';ctx.fillRect(p.x,p.y,p.w,4);});
    STARS.forEach(s=>{if(s.col)return;ctx.fillStyle='#f59e0b';ctx.shadowColor='#f59e0b';ctx.shadowBlur=10;ctx.beginPath();for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;const r=i%2===0?8:4;ctx.lineTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r);}ctx.closePath();ctx.fill();ctx.shadowBlur=0;});
    ENEMIES.forEach(e=>{ctx.fillStyle='#ff4d6d';ctx.shadowColor='#ff4d6d';ctx.shadowBlur=6;ctx.fillRect(e.x,e.y,20,20);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.fillRect(e.x+3,e.y+4,5,5);ctx.fillRect(e.x+12,e.y+4,5,5);ctx.fillStyle='#1a1a1a';ctx.fillRect(e.x+5,e.y+5,3,3);ctx.fillRect(e.x+14,e.y+5,3,3);});
    if(player.invTimer<=0||Math.floor(frame/4)%2===0){ctx.fillStyle='#4a9eff';ctx.shadowColor='#4a9eff';ctx.shadowBlur=8;ctx.fillRect(player.x,player.y,player.w,player.h);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.fillRect(player.x+3,player.y+5,6,6);ctx.fillRect(player.x+player.w-9,player.y+5,6,6);ctx.fillStyle='#1a1a1a';ctx.fillRect(player.x+5,player.y+6,4,4);ctx.fillRect(player.x+player.w-8,player.y+6,4,4);}
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,C.width,32);ctx.fillStyle='#f59e0b';ctx.font='12px Orbitron';ctx.textAlign='left';ctx.fillText('Stars: '+player.score+'/'+STARS.length,8,20);ctx.fillStyle='#ff4d6d';ctx.textAlign='center';ctx.fillText('HP: '+'* '.repeat(player.hp).trim(),C.width/2,20);
    if(state==='dead'){ctx.fillStyle='rgba(6,10,18,0.86)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#ff4d6d';ctx.font='bold 22px Orbitron';ctx.textAlign='center';ctx.fillText('GAME OVER',C.width/2,C.height/2-14);ctx.fillStyle='#7a92b0';ctx.font='13px Exo 2';ctx.fillText('Stars: '+player.score+' — Enter to retry',C.width/2,C.height/2+14);}
    if(state==='win'){ctx.fillStyle='rgba(6,10,18,0.86)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#f59e0b';ctx.font='bold 22px Orbitron';ctx.textAlign='center';ctx.fillText('ALL STARS COLLECTED!',C.width/2,C.height/2-14);ctx.fillStyle='#7a92b0';ctx.font='13px Exo 2';ctx.fillText('Press Enter to play again',C.width/2,C.height/2+14);}
    requestAnimationFrame(loop);
  }
  document.onkeydown=e=>{keys[e.key]=true;if(e.key==='Enter'&&(state==='dead'||state==='win')){STARS=STARS.map(s=>({...s,col:false}));ENEMIES=[{x:110,y:305,vx:1.5,left:100,right:220},{x:310,y:245,vx:-1.5,left:300,right:400},{x:50,y:385,vx:2,left:0,right:580}];player={x:50,y:370,vx:0,vy:0,w:22,h:30,onGround:false,hp:3,invTimer:0,score:0,won:false};state='play';}};

/* ── MINESWEEPER ── */
ENGINES.minesweeper=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;height:100%;overflow:auto;"><div style="font-family:'Orbitron',monospace;font-size:11px;color:#7a92b0;display:flex;gap:20px;"><span>Mines: <span id="mc">10</span></span><span id="msg" style="color:#00e5ff;">Left click reveal — Right click flag</span></div><canvas id="gc" style="border:1px solid #1e3a5f;border-radius:8px;cursor:pointer;"></canvas></div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d');
  const ROWS=9,COLS=9,MINES=10,TS=40;C.width=COLS*TS;C.height=ROWS*TS;
  let board,flags,revealed,state;
  function init(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    flags=Array.from({length:ROWS},()=>Array(COLS).fill(false));
    revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
    state='play';document.getElementById('msg').textContent='Left click reveal — Right click flag';
    let m=0;while(m<MINES){const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);if(board[r][c]!==-1){board[r][c]=-1;m++;}}
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(board[r][c]===-1)continue;let n=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)n++;}board[r][c]=n;}
    draw();
  }
  function reveal(r,c){if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flags[r][c])return;revealed[r][c]=true;if(board[r][c]===0){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);}}
  const NC=['#7dd3fc','#4ade80','#ff4d6d','#a855f7','#f97316','#06b6d4','#ec4899','#94a3b8'];
  function draw(){
    ctx.fillStyle='#0d1524';ctx.fillRect(0,0,C.width,C.height);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const x=c*TS,y=r*TS;
      ctx.fillStyle=revealed[r][c]?'#111d30':'#1e3a5f';ctx.fillRect(x+1,y+1,TS-2,TS-2);
      if(!revealed[r][c]){ctx.fillStyle='#2a4a7a';ctx.fillRect(x+1,y+1,TS-2,6);}
      ctx.strokeStyle='#0d1524';ctx.lineWidth=1;ctx.strokeRect(x,y,TS,TS);
      if(flags[r][c]&&!revealed[r][c]){ctx.fillStyle='#ff4d6d';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('F',x+TS/2,y+TS/2+7);}
      else if(revealed[r][c]){
        if(board[r][c]===-1){ctx.fillStyle='#ff4d6d';ctx.shadowColor='#ff4d6d';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(x+TS/2,y+TS/2,10,0,Math.PI*2);ctx.fill();for(let a=0;a<8;a++){const ang=a*Math.PI/4;ctx.beginPath();ctx.moveTo(x+TS/2+Math.cos(ang)*10,y+TS/2+Math.sin(ang)*10);ctx.lineTo(x+TS/2+Math.cos(ang)*16,y+TS/2+Math.sin(ang)*16);ctx.strokeStyle='#ff4d6d';ctx.lineWidth=2;ctx.stroke();}ctx.shadowBlur=0;}
        else if(board[r][c]>0){ctx.fillStyle=NC[board[r][c]-1];ctx.font='bold 16px Orbitron';ctx.textAlign='center';ctx.fillText(board[r][c],x+TS/2,y+TS/2+6);}
      }
    }
  }
  C.onclick=e=>{if(state!=='play')return;const r=Math.floor(e.offsetY/TS),c=Math.floor(e.offsetX/TS);if(flags[r][c])return;if(board[r][c]===-1){revealed[r][c]=true;state='dead';for(let ri=0;ri<ROWS;ri++)for(let ci=0;ci<COLS;ci++)if(board[ri][ci]===-1)revealed[ri][ci]=true;document.getElementById('msg').textContent='BOOM! Right-click to restart';draw();return;}reveal(r,c);if(revealed.flat().filter(v=>!v).length===MINES){state='win';document.getElementById('msg').textContent='You found all mines!';}draw();};
  C.oncontextmenu=e=>{e.preventDefault();if(state==='dead'){init();return;}const r=Math.floor(e.offsetY/TS),c=Math.floor(e.offsetX/TS);if(!revealed[r][c])flags[r][c]=!flags[r][c];document.getElementById('mc').textContent=MINES-flags.flat().filter(v=>v).length;draw();};
  init();
};

/* ── MEMORY MATCH ── */
ENGINES.memory=function(){
  const w=document.getElementById('game-canvas-wrap');
  // Use SVG shapes instead of emojis
  const SHAPES=['circle','square','triangle','diamond','star','cross','arrow','hexagon'];
  const SHAPE_COLS=['#ff4d6d','#00e5ff','#4ade80','#f59e0b','#a855f7','#f97316','#38bdf8','#ec4899'];
  let cards=[...SHAPES,...SHAPES].sort(()=>Math.random()-.5).map((e,i)=>({id:i,shape:e,col:SHAPE_COLS[SHAPES.indexOf(e)],f:false,m:false}));
  let first=null,second=null,moves=0,matches=0,locked=false;
  w.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;height:100%;overflow:auto;"><div style="display:flex;gap:30px;"><div style="text-align:center;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;letter-spacing:2px;">MOVES</div><div id="mv" style="font-family:'Orbitron',monospace;font-size:22px;color:#00e5ff;">0</div></div><div style="text-align:center;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;letter-spacing:2px;">PAIRS</div><div id="pr" style="font-family:'Orbitron',monospace;font-size:22px;color:#4ade80;">0/8</div></div></div><div id="mgrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(380px,90vw);"></div></div>`;
  function drawShape(shape,col,size){
    const s=`<svg viewBox="0 0 40 40" width="${size}" height="${size}" fill="none"><defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${
      shape==='circle'?`<circle cx="20" cy="20" r="14" fill="${col}" filter="url(#glow)"/>`:
      shape==='square'?`<rect x="6" y="6" width="28" height="28" rx="4" fill="${col}" filter="url(#glow)"/>`:
      shape==='triangle'?`<polygon points="20,4 36,34 4,34" fill="${col}" filter="url(#glow)"/>`:
      shape==='diamond'?`<polygon points="20,4 36,20 20,36 4,20" fill="${col}" filter="url(#glow)"/>`:
      shape==='star'?`<polygon points="20,4 24,15 36,15 26,22 30,34 20,27 10,34 14,22 4,15 16,15" fill="${col}" filter="url(#glow)"/>`:
      shape==='cross'?`<path d="M15 4 H25 V15 H36 V25 H25 V36 H15 V25 H4 V15 H15 Z" fill="${col}" filter="url(#glow)"/>`:
      shape==='arrow'?`<polygon points="20,4 36,20 26,20 26,36 14,36 14,20 4,20" fill="${col}" filter="url(#glow)"/>`:
      `<polygon points="28,6 12,6 4,20 12,34 28,34 36,20" fill="${col}" filter="url(#glow)"/>`
    }</svg>`;return s;}
  function render(){
    document.getElementById('mv').textContent=moves;document.getElementById('pr').textContent=matches+'/8';
    document.getElementById('mgrid').innerHTML=cards.map(c=>`<div onclick="mfc(${c.id})" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;background:${c.m?'rgba(74,222,128,0.1)':c.f?'rgba(0,229,255,0.05)':'#111d30'};border:1px solid ${c.m?'#4ade80':c.f?'#00e5ff':'#1e3a5f'};user-select:none;transition:all .15s;">${c.f||c.m?drawShape(c.shape,c.col,34):drawShape('square','#1e3a5f',34)}</div>`).join('');}
  window.mfc=function(id){if(locked)return;const c=cards[id];if(c.f||c.m)return;c.f=true;if(!first){first=c;render();return;}second=c;moves++;render();if(first.shape===second.shape){first.m=second.m=true;matches++;first=second=null;render();if(matches===8)setTimeout(()=>{document.getElementById('pr').textContent='WIN!';},300);}else{locked=true;setTimeout(()=>{first.f=second.f=false;first=second=null;locked=false;render();},900);}};render();
};

/* ── TIC TAC TOE ── */
ENGINES.tictactoe=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px;height:100%;overflow:auto;"><div id="tst" style="font-family:'Orbitron',monospace;font-size:13px;color:#00e5ff;letter-spacing:2px;">YOUR TURN (X)</div><div id="tboard" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(280px,80vw);"></div><div style="display:flex;gap:24px;"><div style="text-align:center;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;">YOU</div><div id="tw" style="font-family:'Orbitron',monospace;font-size:22px;color:#00e5ff;">0</div></div><div style="text-align:center;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;">DRAW</div><div id="td" style="font-family:'Orbitron',monospace;font-size:22px;color:#7a92b0;">0</div></div><div style="text-align:center;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;">AI</div><div id="tl" style="font-family:'Orbitron',monospace;font-size:22px;color:#ff4d6d;">0</div></div></div><button onclick="ttr()" style="background:rgba(0,229,255,0.1);border:1px solid #00e5ff;color:#00e5ff;font-family:'Exo 2',sans-serif;font-weight:700;font-size:12px;padding:8px 20px;border-radius:6px;cursor:pointer;">NEW GAME</button></div>`;
  const L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let b=Array(9).fill(null),W=0,D=0,Lo=0,over=false;
  function cw(bd,p){return L.some(l=>l.every(i=>bd[i]===p));}
  function mm(bd,isMax){if(cw(bd,'O'))return 10;if(cw(bd,'X'))return -10;if(bd.every(v=>v))return 0;const mv=bd.map((v,i)=>v?null:i).filter(v=>v!==null);if(isMax){let best=-99;mv.forEach(i=>{bd[i]='O';best=Math.max(best,mm(bd,false));bd[i]=null;});return best;}else{let best=99;mv.forEach(i=>{bd[i]='X';best=Math.min(best,mm(bd,true));bd[i]=null;});return best;}}
  function ai(){let best=-99,mv=0;b.forEach((v,i)=>{if(!v){b[i]='O';const s=mm(b,false);b[i]=null;if(s>best){best=s;mv=i;}}});b[mv]='O';}
  function render(msg){document.getElementById('tst').textContent=msg||'YOUR TURN (X)';
    document.getElementById('tboard').innerHTML=b.map((v,i)=>`<div onclick="ttc(${i})" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;background:#111d30;border:1px solid #1e3a5f;color:${v==='X'?'#00e5ff':'#ff4d6d'};font-family:'Orbitron',monospace;font-weight:900;font-size:40px;">${v||''}</div>`).join('');
    document.getElementById('tw').textContent=W;document.getElementById('td').textContent=D;document.getElementById('tl').textContent=Lo;}
  window.ttc=function(i){if(over||b[i])return;b[i]='X';if(cw(b,'X')){W++;render('YOU WIN!');over=true;return;}if(b.every(v=>v)){D++;render('DRAW!');over=true;return;}ai();if(cw(b,'O')){Lo++;render('AI WINS!');over=true;return;}if(b.every(v=>v)){D++;render('DRAW!');over=true;return;}render();};
  window.ttr=function(){b=Array(9).fill(null);over=false;render();};render();
};

/* ── COOKIE CLICKER ── */
ENGINES.clicker=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:22px;height:100%;overflow:auto;"><div style="font-family:'Orbitron',monospace;font-size:10px;color:#7a92b0;letter-spacing:3px;">COOKIES</div><div id="ckc" style="font-family:'Orbitron',monospace;font-size:32px;color:#f59e0b;">0</div><div id="ckr" style="font-family:'Orbitron',monospace;font-size:11px;color:#7a92b0;">0 per second</div>
  <svg id="ckb" onclick="ckClick()" viewBox="0 0 80 80" width="90" height="90" style="cursor:pointer;filter:drop-shadow(0 0 16px rgba(245,158,11,0.6));transition:transform .1s;"><circle cx="40" cy="40" r="35" fill="#5c4a0d" stroke="#f59e0b" stroke-width="2"/><circle cx="40" cy="40" r="28" fill="#7a5e10" opacity="0.5"/><circle cx="28" cy="30" r="5" fill="#3a2800"/><circle cx="52" cy="26" r="4" fill="#3a2800"/><circle cx="48" cy="50" r="6" fill="#3a2800"/><circle cx="24" cy="52" r="4" fill="#3a2800"/><circle cx="38" cy="58" r="3" fill="#3a2800"/><path d="M30 40 Q40 50 50 40" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:min(480px,92vw);" id="cks"></div></div>`;
  const IT=[{n:'Cursor',b:15,c:.1,icon:'cursor'},{n:'Grandma',b:100,c:.5,icon:'person'},{n:'Farm',b:500,c:2,icon:'plant'},{n:'Mine',b:2000,c:8,icon:'pickaxe'},{n:'Factory',b:10000,c:30,icon:'gear'},{n:'Bank',b:50000,c:100,icon:'coin'}];
  const ICONS2={cursor:`<rect x="6" y="2" width="4" height="14" rx="2" fill="currentColor"/><polygon points="6,12 2,18 6,16 8,20 10,19 8,15 12,15" fill="currentColor"/>`,person:`<circle cx="10" cy="6" r="4" fill="currentColor"/><rect x="5" y="11" width="10" height="9" rx="2" fill="currentColor"/>`,plant:`<rect x="9" y="10" width="2" height="10" fill="currentColor"/><ellipse cx="10" cy="8" rx="6" ry="5" fill="currentColor"/>`,pickaxe:`<line x1="4" y1="16" x2="14" y2="4" stroke="currentColor" stroke-width="2.5"/><line x1="2" y1="10" x2="10" y2="2" stroke="currentColor" stroke-width="2"/>`,gear:`<circle cx="10" cy="10" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/>`,coin:`<circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/><text x="10" y="14" text-anchor="middle" font-size="8" fill="currentColor">$</text>`};
  let ck=0,own=Array(IT.length).fill(0),cps=0;
  function fmt(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n);}
  function cost(i){return Math.ceil(IT[i].b*Math.pow(1.15,own[i]));}
  function rck(){document.getElementById('ckc').textContent=fmt(ck);document.getElementById('ckr').textContent=cps.toFixed(1)+'/sec';
    document.getElementById('cks').innerHTML=IT.map((it,i)=>`<div onclick="ckb(${i})" style="background:#111d30;border:1px solid ${ck>=cost(i)?'#f59e0b':'#1e3a5f'};border-radius:10px;padding:10px 12px;cursor:pointer;opacity:${ck>=cost(i)?1:0.45};display:flex;align-items:center;gap:10px;transition:all .2s;">
      <svg viewBox="0 0 20 20" width="24" height="24" fill="none" color="${ck>=cost(i)?'#f59e0b':'#555'}">${ICONS2[it.icon]}</svg>
      <div><div style="font-family:'Orbitron',monospace;font-size:10px;color:#e2eaf5;">${it.n} <span style="color:#7a92b0;">(${own[i]})</span></div><div style="font-family:'Orbitron',monospace;font-size:10px;color:#f59e0b;">${fmt(cost(i))} cookies</div></div></div>`).join('');}
  window.ckClick=function(){const btn=document.getElementById('ckb');ck+=1+cps*.1;btn.style.transform='scale(0.88)';setTimeout(()=>btn.style.transform='scale(1)',80);rck();};
  window.ckb=function(i){if(ck>=cost(i)){ck-=cost(i);own[i]++;cps=IT.reduce((s,it,j)=>s+it.c*own[j],0);rck();}};
  setInterval(()=>{ck+=cps/10;rck();},100);rck();
};

/* ── PONG ── */
ENGINES.pong=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<canvas id="gc" style="display:block;margin:auto;background:#060a12;"></canvas><div style="text-align:center;padding:6px;font-family:'Orbitron',monospace;color:#00e5ff;font-size:11px;">Mouse or W/S to move — First to 7 wins</div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d');C.width=580;C.height=380;const PH=66,PW=10;
  let p1={x:12,y:157},p2={x:558,y:157},ball={x:290,y:190,vx:4,vy:3},s1=0,s2=0,state='idle';
  C.onmousemove=e=>{const r=C.getBoundingClientRect();p1.y=Math.max(0,Math.min(C.height-PH,e.clientY-r.top-PH/2));};
  document.onkeydown=e=>{if(e.key==='w')p1.y=Math.max(0,p1.y-20);if(e.key==='s')p1.y=Math.min(C.height-PH,p1.y+20);if((e.key===' '||e.key==='Enter')&&state!=='play'){s1=0;s2=0;state='play';}};
  C.onclick=()=>{if(state!=='play'){s1=0;s2=0;state='play';}};
  function draw(){
    ctx.fillStyle='#060a12';ctx.fillRect(0,0,C.width,C.height);ctx.setLineDash([10,10]);ctx.strokeStyle='rgba(0,229,255,0.1)';ctx.beginPath();ctx.moveTo(290,0);ctx.lineTo(290,C.height);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#7a92b0';ctx.font='30px Orbitron';ctx.textAlign='center';ctx.fillText(s1+'  '+s2,C.width/2,36);
    [p1,p2].forEach(p=>{ctx.fillStyle='#00e5ff';ctx.shadowColor='#00e5ff';ctx.shadowBlur=10;ctx.beginPath();ctx.roundRect(p.x,p.y,PW,PH,4);ctx.fill();ctx.shadowBlur=0;});
    ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(ball.x,ball.y,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    if(state!=='play'){ctx.fillStyle='rgba(6,10,18,0.72)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#00e5ff';ctx.font='bold 20px Orbitron';ctx.textAlign='center';ctx.fillText('PONG',C.width/2,C.height/2-14);ctx.fillStyle='#7a92b0';ctx.font='13px Exo 2';ctx.fillText('Click or Space to start',C.width/2,C.height/2+10);}
  }
  function loop(){if(state==='play'){ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y<7||ball.y>C.height-7)ball.vy*=-1;if(ball.x<p1.x+PW&&ball.y>p1.y&&ball.y<p1.y+PH&&ball.vx<0){ball.vx*=-1.05;ball.vy+=(ball.y-(p1.y+PH/2))*.1;}if(ball.x>p2.x-7&&ball.y>p2.y&&ball.y<p2.y+PH&&ball.vx>0){ball.vx*=-1.05;ball.vy+=(ball.y-(p2.y+PH/2))*.1;}ball.vx=Math.max(-10,Math.min(10,ball.vx));ball.vy=Math.max(-8,Math.min(8,ball.vy));if(ball.x<0){s2++;ball={x:290,y:190,vx:4,vy:3};}if(ball.x>C.width){s1++;ball={x:290,y:190,vx:-4,vy:3};}if(s1>=7||s2>=7)state='over';const cy=p2.y+PH/2;if(cy<ball.y-5)p2.y=Math.min(C.height-PH,p2.y+4);else if(cy>ball.y+5)p2.y=Math.max(0,p2.y-4);}draw();requestAnimationFrame(loop);}loop();
};

/* ── MAZE ── */
ENGINES.maze=function(){
  const w=document.getElementById('game-canvas-wrap');
  w.innerHTML=`<canvas id="gc" style="display:block;margin:auto;background:#060a12;"></canvas><div style="text-align:center;padding:6px;font-family:'Orbitron',monospace;color:#00e5ff;font-size:11px;">Arrow keys or WASD — Reach the green dot to escape</div>`;
  const C=document.getElementById('gc'),ctx=C.getContext('2d');
  const COLS=19,ROWS=15,SZ=28;C.width=COLS*SZ;C.height=ROWS*SZ;
  let cells,player,moves,won;
  function gen(){cells=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>({r,c,walls:[true,true,true,true],v:false})));function cv(r,c){cells[r][c].v=true;const d=[[0,-1,2,0],[0,1,3,1],[1,0,0,2],[-1,0,1,3]].sort(()=>Math.random()-.5);d.forEach(([dc,dr,w1,w2])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!cells[nr][nc].v){cells[r][c].walls[w1]=false;cells[nr][nc].walls[w2]=false;cv(nr,nc);}});}cv(0,0);player={r:0,c:0};moves=0;won=false;}
  gen();
  function draw(){ctx.fillStyle='#060a12';ctx.fillRect(0,0,C.width,C.height);cells.forEach(row=>row.forEach(cell=>{const x=cell.c*SZ,y=cell.r*SZ;ctx.strokeStyle='#1e3a5f';ctx.lineWidth=1.5;if(cell.walls[0]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+SZ);ctx.stroke();}if(cell.walls[1]){ctx.beginPath();ctx.moveTo(x+SZ,y);ctx.lineTo(x+SZ,y+SZ);ctx.stroke();}if(cell.walls[2]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+SZ,y);ctx.stroke();}if(cell.walls[3]){ctx.beginPath();ctx.moveTo(x,y+SZ);ctx.lineTo(x+SZ,y+SZ);ctx.stroke();}}));
    ctx.fillStyle='#4ade80';ctx.shadowColor='#4ade80';ctx.shadowBlur=16;ctx.beginPath();ctx.arc((COLS-1)*SZ+SZ/2,(ROWS-1)*SZ+SZ/2,8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#00e5ff';ctx.shadowColor='#00e5ff';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(player.c*SZ+SZ/2,player.r*SZ+SZ/2,9,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#7a92b0';ctx.font='11px Orbitron';ctx.textAlign='left';ctx.fillText('Moves: '+moves,6,14);
    if(won){ctx.fillStyle='rgba(6,10,18,0.82)';ctx.fillRect(0,0,C.width,C.height);ctx.fillStyle='#4ade80';ctx.font='bold 18px Orbitron';ctx.textAlign='center';ctx.fillText('ESCAPED!',C.width/2,C.height/2-12);ctx.fillStyle='#7a92b0';ctx.font='12px Exo 2';ctx.fillText(moves+' moves — Enter for new maze',C.width/2,C.height/2+12);}}
  document.onkeydown=e=>{if(won){if(e.key==='Enter'){gen();draw();}return;}const mv={ArrowUp:[0,-1,2],ArrowDown:[0,1,3],ArrowLeft:[-1,0,0],ArrowRight:[1,0,1],w:[0,-1,2],s:[0,1,3],a:[-1,0,0],d:[1,0,1]};if(!mv[e.key])return;e.preventDefault();const[dc,dr,wall]=mv[e.key],cell=cells[player.r][player.c];if(!cell.walls[wall]){player.c+=dc;player.r+=dr;moves++;if(player.r===ROWS-1&&player.c===COLS-1)won=true;}draw();};draw();
};

/* ── FILTERS ── */
function filterCat(cat, btn) {
  document.querySelectorAll('.cat-btn, nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const cards = document.querySelectorAll('#all-grid .game-card');
  let v = 0;
  cards.forEach(c => { const show = cat === 'all' || c.dataset.cat === cat; c.style.display = show ? '' : 'none'; if (show) v++; });
  document.getElementById('game-count').textContent = v + ' GAMES';
  document.getElementById('featured-section').style.display = cat === 'all' ? '' : 'none';
}
function filterGames(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('#all-grid .game-card, #featured-grid .game-card').forEach(c => {
    c.style.display = (!query || c.dataset.title.includes(query)) ? '' : 'none';
  });
}
